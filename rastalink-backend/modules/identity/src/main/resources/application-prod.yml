# Production Environment Configuration
server:
  port: 8080
  servlet:
    context-path: /api
  compression:
    enabled: true
  http2:
    enabled: true

spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://prod-db:5432/rastalink_prod}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:rastalink_prod}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true
  
  security:
    require-ssl: true
  
  # Redis configuration (uncomment when Redis is needed)
  # redis:
  #   host: ${REDIS_HOST:prod-redis}
  #   port: ${REDIS_PORT:6379}
  #   password: ${REDIS_PASSWORD}
  #   database: 0
  #   timeout: 2000ms
  #   jedis:
  #     pool:
  #       max-active: 8
  #       max-idle: 8
  #       min-idle: 0

logging:
  level:
    com.rastalink: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
    org.apache.coyote.http11.Http11Processor: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: ${LOG_FILE:}

management:
  endpoints:
    web:
      exposure:
        include: "health,info,metrics"
  endpoint:
    health:
      show-details: never
  security:
    enabled: true