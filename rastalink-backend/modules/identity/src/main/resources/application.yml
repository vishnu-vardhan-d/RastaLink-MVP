# ========================================
# DO NOT EDIT THIS FILE
# ========================================
# This file should never be modified directly
# 
# For local development: Modify application-local.yml
# For production: Modify application-production.yml
# 
# Spring Boot automatically loads the correct configuration file
# based on the active profile

spring:
  application:
    name: rastalink-identity
  
  # Default configuration (overridden by profile-specific files)
  jpa:
    open-in-view: false
  
  # Enable profile-specific configuration loading
  profiles:
    group:
      local: local
      production: production