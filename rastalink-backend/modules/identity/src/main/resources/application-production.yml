# ========================================
# PRODUCTION CONFIGURATION ONLY
# ========================================
# This file is exclusively for production deployment
# Never modify this for local development

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
  http2:
    enabled: true
  error:
    whitelabel:
      enabled: false

spring:
  # Production Database (PostgreSQL)
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/rastalink_production}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:rastalink_user}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:20}
      minimum-idle: ${DB_POOL_MIN:5}
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  
  jpa:
    hibernate:
      ddl-auto: validate  # Never auto-update production schema
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: ${HIBERNATE_BATCH_SIZE:25}
        order_inserts: true
        order_updates: true
        generate_statistics: false
  
  # Production Security
  security:
    require-ssl: ${REQUIRE_SSL:true}
  
  # Production configuration is self-contained
  # Additional profiles can be added here when needed

# Production Logging (Minimal)
logging:
  level:
    root: WARN
    com.rastalink: INFO
    org.springframework.security: ERROR
    org.hibernate.SQL: ERROR
    org.apache.coyote.http11.Http11Processor: ERROR
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: ${LOG_FILE:}

# Production Management (Restricted)
management:
  endpoints:
    web:
      exposure:
        include: "health,info,metrics"
      base-path: /management
  endpoint:
    health:
      show-details: never
      cache:
        time-to-live: 10s
  security:
    enabled: true
  metrics:
    export:
      prometheus:
        enabled: ${PROMETHEUS_ENABLED:false}