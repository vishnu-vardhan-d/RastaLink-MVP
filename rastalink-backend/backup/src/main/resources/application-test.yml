# Test configuration for Java backend (different port)
server:
  port: 8080

spring:
  profiles:
    active: dev
  
  # HSQL Database (Test)
  datasource:
    url: jdbc:hsqldb:mem:testdb;DB_CLOSE_DELAY=-1
    username: sa
    password: ""
    driver-class-name: org.hsqldb.jdbc.JDBCDriver
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true

# Logging for test
logging:
  level:
    com.rastalink: INFO
    org.springframework.web: INFO