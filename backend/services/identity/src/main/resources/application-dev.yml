# =======================================================
# DEVELOPMENT ENVIRONMENT CONFIGURATION
# =======================================================
# This configuration is for shared development environment
# Uses PostgreSQL database with Flyway migrations

spring:
  # PostgreSQL Database for Development
  datasource:
    url: jdbc:postgresql://localhost:5432/rastalink_identity_dev
    username: rastalink_dev
    password: ${DB_PASSWORD:dev_password}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: validate  # Only validate schema, don't auto-create
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          lob:
            non_contextual_creation: true
  
  # Flyway for database migrations
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

# Development security
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env
  endpoint:
    health:
      show-details: always

# Moderate logging for development
logging:
  level:
    com.rastalink: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: INFO

# Development CORS
cors:
  allowed-origins:
    - "https://dev.rastalink.com"
    - "http://localhost:3000"