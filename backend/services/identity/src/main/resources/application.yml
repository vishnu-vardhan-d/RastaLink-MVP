# =======================================================
# PRODUCTION CONFIGURATION
# =======================================================
# This configuration is for production deployment
# Uses PostgreSQL database for production

server:
  port: ${PORT:8081}  # Identity service port
  address: 0.0.0.0  # Bind to all interfaces for production deployment

spring:
  # PostgreSQL Database for Production
  datasource:
    url: ${DATABASE_URL}
    username: ${PGUSER}
    password: ${PGPASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000
  
  jpa:
    hibernate:
      ddl-auto: validate  # Validate schema only in production
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect
  
  # Enable Flyway for production database migrations
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  
  # Security Configuration
  security:
    user:
      name: admin
      password: admin
      roles: ADMIN

# Production settings
management:
  endpoints:
    web:
      exposure:
        include: "health,info,metrics"  # Limited actuator endpoints for production
  endpoint:
    health:
      show-details: when-authorized
    shutdown:
      enabled: false
  server:
    port: ${MANAGEMENT_PORT:8082}  # Separate management port

# Production logging
logging:
  level:
    com.rastalink: INFO
    org.springframework.security: WARN
    org.springframework.web: WARN
    org.hibernate: WARN
    root: WARN
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: ${LOG_FILE:./logs/identity-service.log}

# Production CORS - Allow frontend domains
cors:
  allowed-origins:
    - "https://rastalink.in"
    - "https://www.rastalink.in"
    - "https://app.rastalink.in"