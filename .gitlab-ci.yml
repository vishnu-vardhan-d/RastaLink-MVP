# RastaLink GitLab CI/CD Pipeline - Java Enterprise Backend + Node.js Frontend

stages:
  - test-frontend
  - test-backend
  - build
  - deploy

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"

cache:
  paths:
    - .m2/repository/
    - node_modules/

# Frontend Tests (Node.js)
test_frontend:
  stage: test-frontend
  image: node:18-alpine
  script:
    - npm ci --cache .npm --prefer-offline
    - npm run check
    - echo "Frontend type checking completed"
  cache:
    paths:
      - node_modules/
  artifacts:
    paths:
      - node_modules/
    expire_in: 1 hour

# Backend Tests (Java Maven)
test_backend:
  stage: test-backend
  image: maven:3.9.4-openjdk-21-slim
  script:
    - cd rastalink-api
    - mvn clean test
    - mvn verify
  cache:
    paths:
      - .m2/repository/
  artifacts:
    reports:
      junit:
        - rastalink-api/target/surefire-reports/TEST-*.xml

# Build Frontend
build_frontend:
  stage: build
  image: node:18-alpine
  dependencies:
    - test_frontend
  script:
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 week
  only:
    - main
    - develop

# Build Backend (Java)
build_backend:
  stage: build
  image: maven:3.9.4-openjdk-21-slim
  script:
    - cd rastalink-api
    - mvn clean package -DskipTests
  artifacts:
    paths:
      - rastalink-api/target/*.jar
    expire_in: 1 week
  only:
    - main
    - develop

# Build Docker Images
build_docker:
  stage: build
  image: docker:24.0
  services:
    - docker:24.0-dind
  script:
    - docker build -t rastalink-api:$CI_COMMIT_SHA ./rastalink-api
    - docker build -t rastalink-frontend:$CI_COMMIT_SHA .
  only:
    - main
    - develop

# Deploy to staging
deploy_staging:
  stage: deploy
  dependencies:
    - build_frontend
    - build_backend
  script:
    - echo "Deploying Java Enterprise backend + React frontend to staging..."
    - echo "Backend health check: /api/health"
    - echo "Backend status: /api/status"
  environment:
    name: staging
    url: https://rastalink-staging.replit.app
  only:
    - develop

# Deploy to production
deploy_production:
  stage: deploy
  dependencies:
    - build_frontend
    - build_backend
  script:
    - echo "Deploying to production..."
    - echo "Java API URL: https://rastalink.in/api"
    - echo "Health check: https://rastalink.in/api/health"
    - echo "Status check: https://rastalink.in/api/status"
  environment:
    name: production
    url: https://rastalink.in
  only:
    - main
  when: manual

# Health check after deployment
health_check_production:
  stage: deploy
  image: alpine:latest
  script:
    - apk add --no-cache curl
    - sleep 30
    - echo "Checking Java Enterprise backend health..."
    # Uncomment when deployed:
    # - curl -f https://rastalink.in/api/health || exit 1
    # - curl -f https://rastalink.in/api/status || exit 1
    # - echo "Backend health check passed"
  only:
    - main
  when: manual