# RastaLink GitLab CI/CD Pipeline

image: node:18-alpine

stages:
  - install
  - test
  - build
  - deploy

variables:
  NODE_ENV: "test"

cache:
  paths:
    - node_modules/

# Install dependencies
install_dependencies:
  stage: install
  script:
    - npm ci --cache .npm --prefer-offline
  artifacts:
    paths:
      - node_modules/
    expire_in: 1 hour

# Run tests and type checking
test:
  stage: test
  dependencies:
    - install_dependencies
  script:
    - npm run check
    - echo "Running health check tests..."
  coverage: '/Coverage: \d+\.\d+%/'

# Build application
build:
  stage: build
  dependencies:
    - install_dependencies
  script:
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 week
  only:
    - main
    - develop

# Deploy to staging
deploy_staging:
  stage: deploy
  dependencies:
    - build
  script:
    - echo "Deploying to staging environment..."
    - echo "Health check endpoint ready at /api/health"
  environment:
    name: staging
    url: https://rastalink-staging.replit.app
  only:
    - develop

# Deploy to production
deploy_production:
  stage: deploy
  dependencies:
    - build
  script:
    - echo "Deploying to production..."
    - echo "Production URL: https://rastalink.in"
    - echo "Health check: https://rastalink.in/api/health"
  environment:
    name: production
    url: https://rastalink.in
  only:
    - main
  when: manual

# Health check after deployment
health_check:
  stage: deploy
  script:
    - apk add --no-cache curl
    - sleep 30
    - echo "Checking application health..."
    # Uncomment when deployed:
    # - curl -f https://rastalink.in/api/health || exit 1
    # - curl -f https://rastalink.in/api/status || exit 1
  only:
    - main
  when: manual