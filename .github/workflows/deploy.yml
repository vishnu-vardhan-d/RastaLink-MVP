name: Deploy RastaLink

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Type check
      run: npm run check
    
    - name: Build application
      run: npm run build
    
    - name: Test health endpoints
      run: |
        timeout 30s npm start &
        sleep 10
        curl -f http://localhost:5000/api/health || exit 1
        curl -f http://localhost:5000/api/status || exit 1

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Deploy to Replit
      # Add your Replit deployment webhook or API call here
      run: |
        echo "Deploying to Replit..."
        # curl -X POST "YOUR_REPLIT_WEBHOOK_URL" \
        #   -H "Authorization: Bearer ${{ secrets.REPLIT_TOKEN }}" \
        #   -H "Content-Type: application/json" \
        #   -d '{"ref": "${{ github.sha }}"}'
    
    - name: Health check after deployment
      run: |
        echo "Waiting for deployment to be ready..."
        sleep 30
        # curl -f https://rastalink.in/api/health || exit 1