name: Deploy to GitHub Pages

# Builds the Vite/React client and publishes it to GitHub Pages (free, static).
# ONE-TIME SETTING: repo → Settings → Pages → Build and deployment →
# Source = "GitHub Actions".  Repo must be Public for free Pages.

on:
  push:
    branches: [main]      # change to your default branch if different
  workflow_dispatch:       # lets you run it manually from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: Build static client (base path = repo name for project pages)
        run: npx vite build --base=/RastaLink-MVP/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/public        # Vite outDir from vite.config.ts

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
